events {
  worker_connections 1024;
}

http {
  # Redirect alt HTTP til HTTPS
  server {
    listen 80;
    server_name tba4250s01.it.ntnu.no;
    return 301 https://$host$request_uri;
  }

  # HTTPS-server: terminerer TLS og proxyer til client/server-containere
  server {
    listen 443 ssl;
    http2 on;
    server_name tba4250s01.it.ntnu.no;

    ssl_certificate     /etc/nginx/certs/tba4250s01.it.ntnu.no.crt;
    ssl_certificate_key /etc/nginx/certs/tba4250s01.it.ntnu.no.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 25m;

    # Backend-API: /api/foo  ->  server:5001/foo
    location /api/ {
      proxy_pass http://server:5001/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 120s;
    }

    # Frontend: alt annet -> client (Nginx i client-containeren serverer SPA)
    location / {
      proxy_pass http://client:80;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }
}
