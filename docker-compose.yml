services:
  client:
    build: ./client
    env_file:
      - client/.env
    ports:
      - "80:80"
    networks: 
      - gib2-network
    depends_on:
      - server

  server:
    build: ./server
    env_file:
      - server/.env
    ports:
      - "5000:5000"
    networks: 
      - gib2-network
    restart: unless-stopped
    volumes:
      - ./server:/app
    depends_on:
      db:
        condition: service_healthy
    command:
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health').read()\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  db:
    image: postgis/postgis:16-3.4
    container_name: my_postgis
    env_file:
      - db/.env
    ports:
      - "6543:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks: 
      - gib2-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d utstyrsoversikt -h localhost -p 5432"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  db-data:
networks:
  gib2-network:
    external: true